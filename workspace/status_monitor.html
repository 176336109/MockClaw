<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw Agent 状态监控</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .status-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .card-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
        }
        
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        
        .status-idle { background: #e0e0e0; color: #666; }
        .status-working { background: #4CAF50; color: white; }
        .status-completed { background: #2196F3; color: white; }
        .status-error { background: #f44336; color: white; }
        .status-warning { background: #ff9800; color: white; }
        
        .card-content {
            color: #666;
            line-height: 1.6;
        }
        
        .progress-bar {
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            margin: 15px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 5px;
            transition: width 0.5s ease;
        }
        
        .task-list {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }
        
        .task-list h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .task-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .task-item:last-child {
            border-bottom: none;
        }
        
        .task-info h3 {
            font-size: 1.1rem;
            color: #333;
            margin-bottom: 5px;
        }
        
        .task-info p {
            font-size: 0.9rem;
            color: #666;
        }
        
        .task-status {
            font-size: 0.9rem;
            padding: 3px 10px;
            border-radius: 12px;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-top: 30px;
            justify-content: center;
        }
        
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-refresh {
            background: #2196F3;
            color: white;
        }
        
        .btn-refresh:hover {
            background: #1976D2;
        }
        
        .btn-details {
            background: #4CAF50;
            color: white;
        }
        
        .btn-details:hover {
            background: #388E3C;
        }
        
        .last-update {
            text-align: center;
            margin-top: 20px;
            color: white;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 4px solid white;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 OpenClaw Agent 状态监控</h1>
            <p>实时了解AI助手的工作状态，避免"卡死"焦虑</p>
        </div>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>正在加载状态信息...</p>
        </div>
        
        <div id="content" class="hidden">
            <div class="status-cards">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">🔄 当前状态</div>
                        <div id="statusBadge" class="status-badge status-idle">空闲</div>
                    </div>
                    <div class="card-content">
                        <p id="statusMessage">系统就绪，等待任务</p>
                        <div class="progress-bar">
                            <div id="progressFill" class="progress-fill" style="width: 0%"></div>
                        </div>
                        <p>进度: <span id="progressText">0</span>%</p>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">💓 心跳监控</div>
                        <div id="heartbeatStatus" class="status-badge status-working">正常</div>
                    </div>
                    <div class="card-content">
                        <p>最后心跳: <span id="lastHeartbeat">--</span></p>
                        <p>运行时间: <span id="uptime">--</span></p>
                        <p>启动时间: <span id="startTime">--</span></p>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">📊 多维表格同步</div>
                        <div id="bitableStatus" class="status-badge status-idle">待测试</div>
                    </div>
                    <div class="card-content">
                        <p>同步状态: <span id="syncStatus">--</span></p>
                        <p>最后同步: <span id="lastSync">--</span></p>
                        <p>任务总数: <span id="totalTasks">0</span></p>
                        <p>同步成功率: <span id="syncRate">100</span>%</p>
                    </div>
                </div>
            </div>
            
            <div class="task-list">
                <h2>📝 最近任务</h2>
                <div id="taskList">
                    <div class="task-item">
                        <div class="task-info">
                            <h3>系统初始化</h3>
                            <p>状态反馈系统启动</p>
                        </div>
                        <div class="task-status status-completed">已完成</div>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn btn-refresh" onclick="loadStatus()">🔄 刷新状态</button>
                <button class="btn btn-details" onclick="showDetails()">📋 查看详情</button>
            </div>
            
            <div class="last-update">
                最后更新: <span id="lastUpdate">--</span> | 自动刷新: <span id="autoRefreshCount">30</span>秒
            </div>
        </div>
    </div>

    <script>
        let autoRefreshInterval;
        let refreshCountdown = 30;
        
        // 状态映射
        const statusMap = {
            'idle': { text: '空闲', class: 'status-idle' },
            'working': { text: '工作中', class: 'status-working' },
            'completed': { text: '已完成', class: 'status-completed' },
            'error': { text: '错误', class: 'status-error' },
            'warning': { text: '警告', class: 'status-warning' },
            'unknown': { text: '未知', class: 'status-idle' }
        };
        
        // 加载状态
        async function loadStatus() {
            try {
                // 在实际部署中，这里应该调用后端API
                // 现在我们先模拟数据
                const response = await fetch('/api/agent-status'); // 假设有这个API
                let data;
                
                try {
                    data = await response.json();
                } catch {
                    // 如果API不存在，使用模拟数据
                    data = getMockData();
                }
                
                updateUI(data);
                
            } catch (error) {
                console.error('加载状态失败:', error);
                // 使用模拟数据
                updateUI(getMockData());
            }
        }
        
        // 获取模拟数据
        function getMockData() {
            const now = new Date();
            const fiveMinutesAgo = new Date(now.getTime() - 5 * 60000);
            
            return {
                agent_id: 'main',
                status: 'working',
                current_task: '建立共享记忆库系统',
                progress: 75,
                last_heartbeat: now.toISOString(),
                start_time: fiveMinutesAgo.toISOString(),
                message: '正在创建安全操作护栏...',
                tasks: [
                    {
                        task: '系统初始化',
                        start_time: fiveMinutesAgo.toISOString(),
                        status: 'completed',
                        progress: 100
                    },
                    {
                        task: '创建共享目录',
                        start_time: new Date(now.getTime() - 4 * 60000).toISOString(),
                        status: 'completed',
                        progress: 100
                    },
                    {
                        task: '实现元数据系统',
                        start_time: new Date(now.getTime() - 3 * 60000).toISOString(),
                        status: 'completed',
                        progress: 100
                    },
                    {
                        task: '建立安全操作护栏',
                        start_time: new Date(now.getTime() - 2 * 60000).toISOString(),
                        status: 'working',
                        progress: 75
                    }
                ],
                bitable_sync: {
                    status: 'healthy',
                    last_sync: new Date(now.getTime() - 1 * 60000).toISOString(),
                    total_tasks: 8,
                    synced_tasks: 8,
                    sync_rate: 100
                }
            };
        }
        
        // 更新UI
        function updateUI(data) {
            // 更新状态卡片
            const statusInfo = statusMap[data.status] || statusMap.unknown;
            document.getElementById('statusBadge').textContent = statusInfo.text;
            document.getElementById('statusBadge').className = `status-badge ${statusInfo.class}`;
            
            document.getElementById('statusMessage').textContent = data.message;
            document.getElementById('progressFill').style.width = `${data.progress}%`;
            document.getElementById('progressText').textContent = data.progress;
            
            // 更新心跳信息
            const lastHeartbeat = new Date(data.last_heartbeat);
            const now = new Date();
            const heartbeatDiff = Math.floor((now - lastHeartbeat) / 1000);
            
            document.getElementById('lastHeartbeat').textContent = formatTime(lastHeartbeat);
            document.getElementById('heartbeatStatus').textContent = heartbeatDiff < 60 ? '正常' : '延迟';
            document.getElementById('heartbeatStatus').className = `status-badge ${heartbeatDiff < 60 ? 'status-working' : 'status-warning'}`;
            
            // 运行时间
            const startTime = new Date(data.start_time);
            const uptime = Math.floor((now - startTime) / 1000);
            document.getElementById('uptime').textContent = formatDuration(uptime);
            document.getElementById('startTime').textContent = formatTime(startTime);
            
            // 更新多维表格同步状态
            if (data.bitable_sync) {
                const syncStatus = data.bitable_sync.status;
                document.getElementById('bitableStatus').textContent = 
                    syncStatus === 'healthy' ? '正常' : '异常';
                document.getElementById('bitableStatus').className = `status-badge ${
                    syncStatus === 'healthy' ? 'status-working' : 'status-warning'
                }`;
                
                document.getElementById('syncStatus').textContent = 
                    syncStatus === 'healthy' ? '正常同步' : '同步异常';
                document.getElementById('lastSync').textContent = 
                    formatTime(new Date(data.bitable_sync.last_sync));
                document.getElementById('totalTasks').textContent = data.bitable_sync.total_tasks;
                document.getElementById('syncRate').textContent = data.bitable_sync.sync_rate;
            }
            
            // 更新任务列表
            const taskList = document.getElementById('taskList');
            taskList.innerHTML = '';
            
            data.tasks.slice(-5).reverse().forEach(task => {
                const taskItem = document.createElement('div');
                taskItem.className = 'task-item';
                
                const taskStatus = task.status === 'completed' ? '已完成' : 
                                 task.status === 'working' ? '进行中' : '等待中';
                const statusClass = task.status === 'completed' ? 'status-completed' :
                                  task.status === 'working' ? 'status-working' : 'status-idle';
                
                taskItem.innerHTML = `
                    <div class="task-info">
                        <h3>${task.task}</h3>
                        <p>${formatTime(new Date(task.start_time))} | 进度: ${task.progress}%</p>
                    </div>
                    <div class="task-status ${statusClass}">${taskStatus}</div>
                `;
                
                taskList.appendChild(taskItem);
            });
            
            // 更新最后更新时间
            document.getElementById('lastUpdate').textContent = formatTime(now);
            
            // 隐藏加载界面，显示内容
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('content').classList.remove('hidden');
        }
        
        // 格式化时间
        function formatTime(date) {
            return date.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        
        // 格式化持续时间
        function formatDuration(seconds) {
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            if (hours > 0) {
                return `${hours}小时${minutes}分`;
            } else if (minutes > 0) {
                return `${minutes}分${secs}秒`;
            } else {
                return `${secs}秒`;
            }
        }
        
        // 显示详情
        function showDetails() {
            alert('详情功能需要后端API支持。\n\n当前状态数据来自模拟数据。\n实际部署时需要连接到Agent的状态API。');
        }
        
        // 自动刷新倒计时
        function updateAutoRefresh() {
            refreshCountdown--;
            document.getElementById('autoRefreshCount').textContent = refreshCountdown;
            
            if (refreshCountdown <= 0) {
                refreshCountdown = 30;
                loadStatus();
            }
        }
        
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            // 初始加载
            loadStatus();
            
            // 启动自动刷新
            autoRefreshInterval = setInterval(updateAutoRefresh, 1000);
            
            // 每30秒刷新数据
            setInterval(loadStatus, 30000);
            
            // 页面可见时刷新
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden) {
                    loadStatus();
                }
            });
        });
        
        // 页面卸载时清理
        window.addEventListener('beforeunload', function() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
            }
        });
    </script>
</body>
</html>
